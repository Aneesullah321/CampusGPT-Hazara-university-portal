<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up - Hazara University</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f3d0f, #1a5d1a);
      color: white;
    }

    /* HEADER */
    .navbar {
      background: #1a2e35;
      padding: 12px 30px;
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar a {
      color: #bae6fd;
      text-decoration: none;
      margin: 0 10px;
      font-size: 14px;
    }

    .navbar a:hover {
      color: white;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo img {
      height: 40px;
    }

    /* FORM */
    .form-container {
      max-width: 500px;
      margin: 60px auto;
      padding: 30px;
      background: rgba(255,255,255,0.12);
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    .btn-custom {
      background: #0B6623;
      border: none;
      color: white;
    }

    .btn-custom:hover {
      background: #094d1a;
    }

    .btn-custom:active {
      background: #32CD32 !important;
    }
  </style>
</head>

<body>

<!-- CLEAN HEADER (NO DUPLICATION, NO INLINE CHAOS) -->
<header class="navbar">
  <a href="index.html" class="logo">
    <img src="https://cdn.moawin.pk/images/branches/2024/04/29/654654_1pv84.png" alt="HU Logo">
    <h1 style="font-size:16px; margin:0; color:#e0f2fe;">Hazara University</h1>
  </a>

  <nav>
    <a href="index.html">Home</a>
    <a href="admission.html">Admissions</a>
    <a href="faculties.html">Faculties</a>
    <a href="programs.html">Programs</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<!-- SIGNUP FORM -->
<div class="form-container">
  <h2 class="text-center mb-4">Sign Up</h2>

  <form id="signupForm">

    <input class="form-control mb-3" type="text" id="name" placeholder="Full Name" required>
    <input class="form-control mb-3" type="email" id="email" placeholder="Email" required>
    <input class="form-control mb-3" type="text" id="roll" placeholder="Roll Number" required>
    <input class="form-control mb-3" type="text" id="enroll" placeholder="Enrollment Number" required>
    <input class="form-control mb-3" type="text" id="course" placeholder="Course" required>
    <input class="form-control mb-3" type="text" id="semester" placeholder="Semester" required>

    <button type="submit" class="btn btn-custom w-100">Create Account</button>

  </form>
</div>

<script>
document.getElementById('signupForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const user = {
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    roll: document.getElementById('roll').value,
    enroll: document.getElementById('enroll').value,
    course: document.getElementById('course').value,
    semester: document.getElementById('semester').value
  };

  localStorage.setItem(user.roll, JSON.stringify(user));

  alert("Account created successfully");
  window.location.href = "login.html";
});
</script>

</body>
</html>
